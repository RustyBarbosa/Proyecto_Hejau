<svg width="100%" viewBox="0 0 200 220" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Logo HEJAU - Ciencia, Datos, Vida, Espacio</title>
  <desc>Escudo con astronauta, cohete, latido del corazón y glifo mesoamericano</desc>
  
  <!-- Fondo del escudo -->
  <rect x="20" y="20" width="160" height="160" rx="20" fill="#ffffff" stroke="#001f3f" stroke-width="3"/>
  
  <!-- Astronauta -->
  <circle cx="45" cy="80" r="12" fill="none" stroke="#001f3f" stroke-width="1.5"/>
  <circle cx="45" cy="65" r="8" fill="none" stroke="#001f3f" stroke-width="1.5"/>
  <line x1="45" y1="88" x2="45" y2="105" stroke="#001f3f" stroke-width="1.5"/>
  
  <!-- Cohete -->
  <polygon points="120,50 130,70 125,70 125,90 115,90 115,70 110,70" fill="#001f3f"/>
  <circle cx="122" cy="60" r="3" fill="#ffffff"/>
  
  <!-- Línea de latido (ECG) -->
  <polyline points="50,100 60,100 65,90 70,110 75,95 85,105 95,100" fill="none" stroke="#001f3f" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Corazón -->
  <path d="M 105 100 Q 105 95 110 95 Q 115 95 115 100 Q 115 95 120 95 Q 125 95 125 100 Q 125 110 115 118 Q 105 110 105 100" fill="none" stroke="#001f3f" stroke-width="1.5"/>
  
  <!-- Estrellas -->
  <circle cx="60" cy="40" r="1.5" fill="#001f3f"/>
  <circle cx="90" cy="35" r="1" fill="#001f3f"/>
  <circle cx="140" cy="45" r="1.5" fill="#001f3f"/>
  <circle cx="110" cy="30" r="1" fill="#001f3f"/>
  
  <!-- Glifo mesoamericano (parte inferior) -->
  <g transform="translate(100, 155)">
    <rect x="-15" y="0" width="8" height="8" fill="#001f3f"/>
    <rect x="-5" y="0" width="8" height="8" fill="#001f3f"/>
    <rect x="5" y="0" width="8" height="8" fill="#001f3f"/>
    <rect x="-10" y="8" width="8" height="8" fill="#001f3f"/>
    <rect x="2" y="8" width="8" height="8" fill="#001f3f"/>
  </g>
</svg>